<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop – FreshMart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<!-- Navbar (simplified) -->
<nav class="navbar navbar-expand-lg main-nav sticky-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html">
      <span class="brand-icon">🛒</span>
      <span class="brand-name">Fresh<span>Mart</span></span>
    </a>
    <div class="search-bar-container d-none d-lg-flex flex-grow-1 mx-4">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products…" autocomplete="off"/>
        <button onclick="applyFilters()"><i class="fas fa-search"></i></button>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
    </div>
    <div class="nav-actions d-flex align-items-center gap-3">
      <a href="wishlist.html" class="nav-icon-btn"><i class="fas fa-heart"></i><span class="badge" id="wishlistCount">0</span></a>
      <a href="cart.html" class="nav-icon-btn"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartCount">0</span></a>
      <a href="login.html" class="nav-icon-btn" id="accountBtn"><i class="fas fa-user-circle"></i></a>
    </div>
  </div>
</nav>

<!-- Page Hero -->
<div class="page-hero">
  <div class="container">
    <h1 id="pageTitle">All Products</h1>
    <nav aria-label="breadcrumb" class="mt-2">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
        <li class="breadcrumb-item active" id="breadCat">Shop</li>
      </ol>
    </nav>
  </div>
</div>

<section class="py-5" style="background:var(--off-white)">
  <div class="container">
    <div class="row g-4">

      <!-- Sidebar -->
      <div class="col-lg-3">
        <div class="sidebar-filter">
          <h5 class="fw-700 mb-4" style="font-family:var(--font-display);font-weight:900">Filters</h5>

          <div class="filter-section">
            <h6><i class="fas fa-list me-2 text-success"></i>Category</h6>
            <div id="catFilters">
              <label class="d-flex align-items-center gap-2 mb-2 cursor-pointer" style="cursor:pointer">
                <input type="radio" name="category" value="all" checked onchange="applyFilters()"/> All Categories
              </label>
              <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
                <input type="radio" name="category" value="vegetables" onchange="applyFilters()"/> 🥬 Vegetables
              </label>
              <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
                <input type="radio" name="category" value="fruits" onchange="applyFilters()"/> 🍎 Fruits
              </label>
              <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
                <input type="radio" name="category" value="dairy" onchange="applyFilters()"/> 🧀 Dairy
              </label>
              <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
                <input type="radio" name="category" value="snacks" onchange="applyFilters()"/> 🍪 Snacks
              </label>
              <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
                <input type="radio" name="category" value="pulses" onchange="applyFilters()"/> 🫘 Pulses
              </label>
              <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
                <input type="radio" name="category" value="beverages" onchange="applyFilters()"/> ☕ Beverages
              </label>
            </div>
          </div>

          <div class="filter-section">
            <h6><i class="fas fa-rupee-sign me-2 text-success"></i>Price Range</h6>
            <div class="price-display">
              <span>₹0</span>
              <span id="maxPriceLabel">₹<span id="priceVal">500</span></span>
            </div>
            <input type="range" class="price-range" min="0" max="500" value="500" id="priceRange" oninput="updatePrice(this.value)" onchange="applyFilters()"/>
          </div>

          <div class="filter-section">
            <h6><i class="fas fa-star me-2 text-success"></i>Rating</h6>
            <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
              <input type="radio" name="rating" value="0" checked onchange="applyFilters()"/> All Ratings
            </label>
            <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
              <input type="radio" name="rating" value="4" onchange="applyFilters()"/> ⭐ 4+ Stars
            </label>
            <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
              <input type="radio" name="rating" value="4.5" onchange="applyFilters()"/> ⭐ 4.5+ Stars
            </label>
          </div>

          <div class="filter-section">
            <h6><i class="fas fa-check-circle me-2 text-success"></i>Availability</h6>
            <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
              <input type="checkbox" id="inStockOnly" onchange="applyFilters()"/> In Stock Only
            </label>
            <label class="d-flex align-items-center gap-2 mb-2" style="cursor:pointer">
              <input type="checkbox" id="onSaleOnly" onchange="applyFilters()"/> On Sale
            </label>
          </div>

          <button class="btn btn-sm w-100 mt-2" style="background:var(--border);border-radius:8px;font-weight:600" onclick="resetFilters()">
            <i class="fas fa-undo me-2"></i>Reset Filters
          </button>
        </div>
      </div>

      <!-- Products Area -->
      <div class="col-lg-9">
        <!-- Toolbar -->
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-3 shadow-sm">
          <span id="resultCount" class="fw-600" style="font-size:0.9rem;color:var(--text-mid)">Showing all products</span>
          <div class="d-flex align-items-center gap-3">
            <label style="font-size:0.85rem;color:var(--text-mid)">Sort:</label>
            <select id="sortBy" class="form-select form-select-sm" style="width:180px;border-radius:8px" onchange="applyFilters()">
              <option value="default">Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="rating">Top Rated</option>
              <option value="name">Name A–Z</option>
            </select>
          </div>
        </div>

        <div class="row g-4" id="productGrid"></div>

        <div id="noResults" class="empty-state d-none">
          <i class="fas fa-search"></i>
          <h5>No products found</h5>
          <p style="color:var(--text-light)">Try adjusting your filters or search term.</p>
          <button class="btn btn-primary-fresh mt-2" onclick="resetFilters()">Clear Filters</button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Scroll Top -->
<button class="scroll-top" onclick="scrollToTop()"><i class="fas fa-arrow-up"></i></button>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast"><div class="toast-header"><strong class="me-auto">🛒 FreshMart</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div><div class="toast-body" id="toastMsg"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/cart.js"></script>
<script>
  function productCard(p) {
    const discount = p.oldPrice ? Math.round((p.oldPrice - p.price) / p.oldPrice * 100) : 0;
    const stockClass = p.stock === 0 ? 'out-stock' : p.stock <= 5 ? 'low-stock' : 'in-stock';
    const stockText = p.stock === 0 ? 'Out of Stock' : p.stock <= 5 ? `Only ${p.stock} left` : 'In Stock';
    const isWL = isWishlisted(p.id);
    return `<div class="col-6 col-md-4">
      <div class="product-card">
        <div class="product-img-wrap">
          ${p.badge ? `<span class="product-badge">${p.badge}</span>` : p.isNew ? `<span class="product-badge new">NEW</span>` : ''}
          <span class="product-emoji">${p.emoji}</span>
          <button class="wishlist-btn ${isWL ? 'active' : ''}" onclick="handleWishlist(${p.id}, this)"><i class="fa${isWL ? 's' : 'r'} fa-heart"></i></button>
        </div>
        <div class="product-body">
          <div class="product-cat">${p.cat}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-unit">${p.unit}</div>
          <div class="product-rating">${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5 - Math.floor(p.rating))}<span>(${p.reviews})</span></div>
          <div class="price-row">
            <span class="price">₹${p.price}</span>
            ${p.oldPrice ? `<span class="price-old">₹${p.oldPrice}</span>` : ''}
            ${discount ? `<span class="price-discount">${discount}% OFF</span>` : ''}
          </div>
          <span class="stock-badge ${stockClass}">${stockText}</span>
          <div class="qty-add-row">
            <div class="qty-selector">
              <button class="qty-btn" onclick="changeQty(this,-1)">−</button>
              <input class="qty-input" type="number" value="1" min="1" max="${p.stock}" readonly/>
              <button class="qty-btn" onclick="changeQty(this,1)">+</button>
            </div>
            <button class="btn-add-cart" onclick="handleAddCart(${p.id}, this)" ${p.stock===0?'disabled':''}>
              <i class="fas fa-cart-plus"></i> Add
            </button>
          </div>
        </div>
      </div>
    </div>`;
  }

  function changeQty(btn, delta) {
    const input = btn.parentElement.querySelector('.qty-input');
    const val = parseInt(input.value) + delta;
    if (val >= 1 && val <= parseInt(input.max)) input.value = val;
  }

  function handleAddCart(id, btn) {
    const input = btn.closest('.qty-add-row').querySelector('.qty-input');
    addToCart(id, parseInt(input?.value || 1));
    btn.innerHTML = '<i class="fas fa-check"></i> Added!';
    btn.style.background = '#43a047';
    setTimeout(() => { btn.innerHTML = '<i class="fas fa-cart-plus"></i> Add'; btn.style.background = ''; }, 1500);
  }

  function handleWishlist(id, btn) {
    const added = toggleWishlist(id);
    btn.classList.toggle('active', added);
    btn.innerHTML = `<i class="fa${added ? 's' : 'r'} fa-heart"></i>`;
  }

  function updatePrice(val) {
    document.getElementById('priceVal').textContent = val;
  }

  function applyFilters() {
    const cat = document.querySelector('input[name="category"]:checked')?.value || 'all';
    const maxPrice = parseInt(document.getElementById('priceRange')?.value || 500);
    const minRating = parseFloat(document.querySelector('input[name="rating"]:checked')?.value || 0);
    const inStockOnly = document.getElementById('inStockOnly')?.checked;
    const onSaleOnly = document.getElementById('onSaleOnly')?.checked;
    const sortBy = document.getElementById('sortBy')?.value || 'default';
    const q = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';

    let filtered = [...PRODUCTS];
    if (cat !== 'all') filtered = filtered.filter(p => p.cat === cat);
    if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
    filtered = filtered.filter(p => p.price <= maxPrice);
    if (minRating > 0) filtered = filtered.filter(p => p.rating >= minRating);
    if (inStockOnly) filtered = filtered.filter(p => p.stock > 0);
    if (onSaleOnly) filtered = filtered.filter(p => p.oldPrice);

    if (sortBy === 'price-asc') filtered.sort((a, b) => a.price - b.price);
    else if (sortBy === 'price-desc') filtered.sort((a, b) => b.price - a.price);
    else if (sortBy === 'rating') filtered.sort((a, b) => b.rating - a.rating);
    else if (sortBy === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));

    const grid = document.getElementById('productGrid');
    const empty = document.getElementById('noResults');
    document.getElementById('resultCount').textContent = `Showing ${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;
    grid.innerHTML = filtered.map(productCard).join('');
    empty.classList.toggle('d-none', filtered.length > 0);
  }

  function resetFilters() {
    document.querySelectorAll('input[name="category"]')[0].checked = true;
    document.querySelectorAll('input[name="rating"]')[0].checked = true;
    document.getElementById('priceRange').value = 500;
    document.getElementById('priceVal').textContent = '500';
    document.getElementById('inStockOnly').checked = false;
    document.getElementById('onSaleOnly').checked = false;
    document.getElementById('sortBy').value = 'default';
    if (document.getElementById('searchInput')) document.getElementById('searchInput').value = '';
    applyFilters();
  }

  document.addEventListener('DOMContentLoaded', () => {
    updateCartBadge();
    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat');
    const q = params.get('q');
    if (cat) {
      const radio = document.querySelector(`input[name="category"][value="${cat}"]`);
      if (radio) radio.checked = true;
      document.getElementById('pageTitle').textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      document.getElementById('breadCat').textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    }
    if (q) {
      document.getElementById('searchInput').value = q;
      document.getElementById('pageTitle').textContent = `Search: "${q}"`;
    }
    applyFilters();
  });
</script>
</body>
</html>
