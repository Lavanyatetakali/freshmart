# ===== SERVER =====
server.port=8080
spring.application.name=freshmart-backend

# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://localhost:3306/freshmart_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Lavanya
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA/HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
jwt.secret=freshMartSuperSecretKey2025ChangeThisInProduction!
jwt.expiration=86400000

# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500

# ===== LOGGING =====
logging.level.com.grocerystore=DEBUG
logging.level.org.springframework.security=INFO
