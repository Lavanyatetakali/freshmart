<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – FreshMart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<nav class="navbar main-nav">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand" href="../index.html">
      <span class="brand-icon">🛒</span>
      <span class="brand-name">Fresh<span>Mart</span></span>
    </a>
  </div>
</nav>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div style="font-size:3rem">🛒</div>
        <h2>Welcome Back!</h2>
        <p class="subtitle">Sign in to your FreshMart account</p>
      </div>

      <div id="errorMsg" class="alert alert-danger py-2 d-none"></div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" class="form-control-fresh" placeholder="your@email.com"/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="form-control-fresh" placeholder="Enter password"/>
          <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-light)" id="togglePassBtn">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <label class="d-flex align-items-center gap-2" style="cursor:pointer;font-size:0.85rem">
          <input type="checkbox"/> Remember me
        </label>
        <a href="#" style="font-size:0.85rem;color:var(--green);font-weight:600">Forgot Password?</a>
      </div>

      <button class="btn-auth" onclick="handleLogin()">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>

      <div class="auth-divider"><span>or continue with</span></div>

      <div class="d-flex gap-3 mb-3">
        <button class="flex-1 btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2 w-50" style="border-radius:10px;font-size:0.85rem" onclick="socialLogin('Google')">
          <img src="https://img.icons8.com/color/20/google-logo.png" alt="G"/> Google
        </button>
        <button class="flex-1 btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2 w-50" style="border-radius:10px;font-size:0.85rem" onclick="socialLogin('Facebook')">
          <img src="https://img.icons8.com/color/20/facebook.png" alt="F"/> Facebook
        </button>
      </div>

      <div class="auth-link">
        Don't have an account? <a href="register.html">Create Account</a>
      </div>
      <div class="text-center mt-2">
        <a href="../index.html" style="font-size:0.82rem;color:var(--text-light)">
          <i class="fas fa-arrow-left me-1"></i>Back to Home
        </a>
      </div>

      <!-- Demo credentials hint -->
      <div class="mt-3 p-3 rounded-3" style="background:var(--green-pale);font-size:0.8rem;color:var(--text-mid)">
        <strong>Demo credentials:</strong><br/>
        Email: demo@freshmart.in | Password: demo123
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/cart.js"></script>
<script>
function togglePass() {
  const input = document.getElementById('password');
  const icon = document.querySelector('#togglePassBtn i');
  if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { input.type = 'password'; icon.className = 'fas fa-eye'; }
}

function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('errorMsg');

  if (!email || !password) {
    err.textContent = 'Please fill in all fields.'; err.classList.remove('d-none'); return;
  }
  if (!email.includes('@')) {
    err.textContent = 'Please enter a valid email.'; err.classList.remove('d-none'); return;
  }

  // Demo login
  const name = email.split('@')[0].charAt(0).toUpperCase() + email.split('@')[0].slice(1);
  loginUser(email, name);
  err.classList.add('d-none');

  const btn = document.querySelector('.btn-auth');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing In…';
  btn.disabled = true;

  setTimeout(() => {
    const redirect = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html';
    window.location.href = redirect;
  }, 1200);
}

function socialLogin(provider) {
  loginUser(`${provider.toLowerCase()}@demo.com`, provider + 'User');
  window.location.href = 'dashboard.html';
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
